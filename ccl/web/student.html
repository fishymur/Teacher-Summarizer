<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tutor</title>
<style>
  :root{ --paper:#F5F7FA; --surface:#FFFFFF; --ink:#16203A; --muted:#5A6785; --line:#E2E6EF;
         --primary:#4338CA; --primary-soft:#ECEBFB; --teal:#0F766E; --teal-bg:#E6F4F1;
         --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
         --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); font-size:15px; }
  header{ display:flex; align-items:center; gap:14px; padding:14px 20px; background:var(--surface); border-bottom:1px solid var(--line); }
  .brand{ font-weight:700; letter-spacing:-0.02em; }
  header a{ margin-left:auto; font-size:12px; color:var(--primary); }
  main{ max-width:720px; margin:0 auto; padding:20px 18px 90px; }
  label{ display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  select, input, textarea{ width:100%; font-family:var(--sans); font-size:14px; color:var(--ink);
    padding:9px 11px; border:1px solid var(--line); border-radius:9px; background:var(--surface); }
  textarea{ resize:vertical; min-height:64px; }
  .row{ display:flex; gap:12px; } .row>div{ flex:1; }
  .banner{ background:#FBEEDB; color:#B45309; font-family:var(--mono); font-size:12px; padding:8px 20px; border-bottom:1px solid var(--line); display:none; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-top:14px; }
  .log{ display:flex; flex-direction:column; gap:10px; min-height:200px; margin-bottom:12px; }
  .msg{ padding:10px 13px; border-radius:13px; max-width:88%; animation:fade .2s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1;} }
  .msg.me{ align-self:flex-end; background:var(--primary-soft); }
  .msg.tutor{ align-self:flex-start; background:var(--paper); border:1px solid var(--line); }
  .msg .who{ font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:3px; }
  .sources{ margin-top:6px; font-size:12px; color:var(--teal); }
  .btn{ background:var(--primary); color:#fff; border:0; padding:10px 16px; border-radius:9px; font-weight:600; cursor:pointer; margin-top:12px; }
  .btn:disabled{ opacity:.5; }
  .empty{ color:var(--muted); text-align:center; padding:16px; }
  .hint{ font-size:11px; color:var(--muted); margin-top:4px; }
</style>
</head>
<body>
<header>
  <div class="brand">Tutor</div>
  <a href="/">Switch interface</a>
</header>
<div class="banner" id="banner"></div>
<main>
  <div class="row">
    <div><label>Course</label><select id="course"></select></div>
    <div><label>Mode</label><select id="mode">
      <option value="learn">Learn</option>
      <option value="practice" selected>Practice</option>
      <option value="review">Review</option></select>
      <div class="hint" id="modeHint"></div></div>
  </div>

  <div class="card">
    <div class="log" id="log"><div class="empty">Pick a course and ask a question to begin.</div></div>
    <label>Your work so far (optional)</label>
    <textarea id="attempt" placeholder="Type what you've tried — the tutor helps more once it sees your effort."></textarea>
    <label>Photo of your work (optional)</label>
    <input type="file" id="img" accept="image/*">
    <div class="hint" id="imgHint"></div>
    <label>Your question</label>
    <input id="msg" placeholder="e.g. How do I start this?" onkeydown="if(event.key==='Enter')send()">
    <button class="btn" id="sendBtn" onclick="send()">Send</button>
  </div>
</main>
<script>
let STATE={courses:[]}, SESSION=null, VISION=false;

async function api(path, body){
  try{
    const payload = Object.assign({role:"student"}, body||{});
    const r = await fetch(path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    return await r.json();
  }catch(e){ return {error:"Couldn't reach the tutor. Is the app still running?"}; }
}
async function load(){
  STATE = await (await fetch("/api/student/state")).json();
  VISION = !!STATE.vision;
  const stub = (STATE.provider||"").toLowerCase().includes("stub");
  const b=document.getElementById("banner");
  if(stub){ b.style.display="block"; b.textContent="Demo mode — the tutor is running on a canned offline model."; }
  const sel=document.getElementById("course");
  sel.innerHTML = STATE.courses.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("")
     || '<option value="">No published courses yet</option>';
  document.getElementById("imgHint").textContent = VISION ? "The tutor can read your photo." : "Photo reading needs the live model; in demo mode it's ignored.";
  modeHint();
}
function modeHint(){
  const m={learn:"Learn — full walk-throughs after you've tried.",practice:"Practice — hints only, no final answers.",review:"Review — consolidate before a test."}[document.getElementById("mode").value];
  document.getElementById("modeHint").textContent = m||"";
}
document.getElementById("mode").onchange = modeHint;

async function readImg(){
  const f=document.getElementById("img").files[0]; if(!f) return null;
  return new Promise(res=>{ const r=new FileReader();
    r.onload=()=>res({media_type:f.type||"image/png", data_b64:r.result.split(",")[1]});
    r.onerror=()=>res(null); r.readAsDataURL(f); });
}
function addMsg(who,text){
  const log=document.getElementById("log"); if(log.querySelector(".empty")) log.innerHTML="";
  const d=document.createElement("div"); d.className="msg "+who;
  d.innerHTML=`<div class="who">${who==="me"?"You":"Tutor"}</div>${esc(text)}`;
  log.appendChild(d); log.scrollTop=log.scrollHeight; return d;
}
async function send(){
  const text=document.getElementById("msg").value; if(!text.trim()) return;
  const course=document.getElementById("course").value; if(!course){ addMsg("tutor","No course is available yet."); return; }
  const image=await readImg();
  addMsg("me", text + (image?"  📎 photo":""));
  document.getElementById("msg").value=""; document.getElementById("sendBtn").disabled=true;
  const pending=addMsg("tutor","thinking…"); pending.style.opacity="0.6";
  const r=await api("/api/tutor",{course_id:course, mode:document.getElementById("mode").value,
    message:text, attempt:document.getElementById("attempt").value, attempt_image:image, session_id:SESSION});
  document.getElementById("sendBtn").disabled=false; pending.remove();
  if(r.error){ addMsg("tutor","⚠ "+r.error); return; }
  SESSION=r.session_id;
  const d=addMsg("tutor", r.response_text);
  if(r.citations && r.citations.length){
    const s=document.createElement("div"); s.className="sources";
    s.textContent="Sources: "+r.citations.map(c=>`${c.source_id} ${c.anchor}`).join(", ");
    d.appendChild(s);
  }
  document.getElementById("img").value="";
}
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
load();
</script>
</body>
</html>
